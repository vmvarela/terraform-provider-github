# Configuration for actions/labeler
# Labels must match the github-scrum label system (namespaced prefixes).

"type:feature":
  - head-branch:
      - '^feat/'
      - '^feature/'
  - changed-files:
      - any-glob-to-any-file:
          - "github/resource_*.go"
          - "github/data_source_*.go"

"type:bug":
  - head-branch:
      - '^fix/'
      - '^bugfix/'

"type:chore":
  - head-branch:
      - '^chore/'
      - '^maint/'
      - '^deps/'
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"
          - "GNUmakefile"
          - ".goreleaser.yml"
          - ".golangci.yml"
          - ".gitignore"
          - "go.mod"
          - "go.sum"

"type:docs":
  - head-branch:
      - '^docs/'
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.md"
          - "website/**"

"type:spike":
  - head-branch:
      - '^spike/'
